minimumReleaseAgeExclude:
  - '@types/node@26.1.0'
  - vite@8.1.3
shellEmulator: true

trustPolicy: no-downgrade

trustPolicyExclude:
  - semver@5.7.2

packages:
  - playground
  - examples/*
onlyBuiltDependencies:
  - '@vscode/vsce-sign'
  - esbuild
  - keytar
allowBuilds:
  '@vscode/vsce-sign': true
  keytar: true
